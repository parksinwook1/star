<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>별의 진화 시뮬레이션 앱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #10183a, #050816 70%);
      color: white;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    header {
      width: 100%;
      height: 100vh;
      background: radial-gradient(circle at top, #10183a, #050816 70%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }

    .start-screen {
      text-align: center;
    }

    .start-screen h1 {
      font-size: 52px;
      color: #ffe082;
      margin-bottom: 20px;
    }

    .start-screen p {
      font-size: 22px;
      margin-bottom: 30px;
      color: #cfd8dc;
    }

    .control-card {
      background: rgba(255,255,255,0.08);
      padding: 25px;
      border-radius: 20px;
      min-width: 240px;
    }

    .control-card label {
      font-size: 22px;
      font-weight: bold;
      display: block;
      margin-bottom: 15px;
    }

    .simulation-screen {
      width: 100%;
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .stage-title {
      position: absolute;
      top: 30px;
      width: 100%;
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      color: #fff59d;
      z-index: 10;
    }

    header {
      height: 15%;
      background: rgba(0,0,0,0.5);
      border-bottom: 2px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 10px;
      backdrop-filter: blur(10px);
    }

    header h1 {
      font-size: 28px;
      color: #ffe082;
    }

    .control-box {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    select {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #1e2a5c;
      color: white;
      font-size: 16px;
    }

    main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .space {
      width: 100%;
      height: 100%;
      position: relative;
      background: linear-gradient(to bottom, #02030a, #09142d);
    }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 2px, transparent 2px);
      background-size: 120px 120px, 180px 180px, 250px 250px;
      opacity: 0.5;
      animation: twinkle 4s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.3; }
      to { opacity: 0.7; }
    }

    .star {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: orange;
      box-shadow: 0 0 50px orange;
      transition: all 2s ease;
    }

    .nebula {
      background: radial-gradient(circle, rgba(173,216,230,0.9), rgba(100,100,255,0.2));
      box-shadow: 0 0 80px rgba(173,216,230,0.7);
      width: 180px;
      height: 180px;
    }

    .main-sequence {
      background: #ffd54f;
      box-shadow: 0 0 70px #ffd54f;
      width: 120px;
      height: 120px;
    }

    .red-giant {
      background: #ff7043;
      box-shadow: 0 0 120px #ff7043;
      width: 220px;
      height: 220px;
    }

    .supernova {
      background: white;
      box-shadow: 0 0 200px white;
      width: 300px;
      height: 300px;
    }

    .white-dwarf {
      background: #e0f7fa;
      box-shadow: 0 0 40px #e0f7fa;
      width: 70px;
      height: 70px;
    }

    .black-hole {
      background: black;
      border: 4px solid purple;
      box-shadow: 0 0 100px purple;
      width: 90px;
      height: 90px;
    }

    footer {
      height: 30%;
      background: rgba(0,0,0,0.6);
      border-top: 2px solid rgba(255,255,255,0.1);
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .info-box {
      font-size: 28px;
      line-height: 2.1;
      padding: 28px;
      min-height: 180px;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 18px;
      line-height: 1.9;
      min-height: 140px;
      font-size: 22px;
      font-weight: 500;
      background: rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 12px;
      line-height: 1.7;
      min-height: 90px;
    }

    .buttons {
      margin-top: 15px;
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    button {
      padding: 16px 34px;
      border: none;
      border-radius: 14px;
      background: #3949ab;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: #3949ab;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5c6bc0;
      transform: scale(1.05);
    }

    .status {
      margin-top: 10px;
      color: #90caf9;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      margin-top: 5px;
      color: #90caf9;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <header id="startScreen">
    <div class="start-screen">
      <h1>🌌 별의 진화 시뮬레이션 앱</h1>
      <p>별의 질량과 크기를 선택하고 우주의 진화를 탐험해보세요!</p>

      <div class="control-box">
        <div class="control-card">
          <label>⭐ 별의 질량</label>
          <select id="massSelect">
            <option value="small">작은 질량의 별</option>
            <option value="large">큰 질량의 별</option>
          </select>
        </div>

        <div class="control-card">
          <label>🌠 별의 크기</label>
          <select id="sizeSelect">
            <option value="small">작음</option>
            <option value="medium">보통</option>
            <option value="large">큼</option>
          </select>
        </div>
      </div>

      <button onclick="startSimulation()" style="font-size:32px;padding:24px 60px;border-radius:20px;box-shadow:0 0 25px rgba(255,255,255,0.4);margin-top:30px;">🌌 시뮬레이션 시작</button>
    </div>
  </header>

  <div class="simulation-screen" id="simulationScreen">

  <main>
    <div class="space">
      <div class="stars"></div>
        <div class="stage-title" id="stageTitle">☁️ 성운 단계</div>
      <div class="star nebula" id="star"></div>
    </div>
  </main>

  <footer>
    <div class="info-box" id="infoBox">
      시작 버튼을 눌러 별의 진화 과정을 확인해보세요.
    </div>

    <div class="status" id="statusBox">
      온도: - | 밝기: - | 크기: -
    </div>

    <div class="buttons">
      <button onclick="resetSimulation()" style="font-size:26px;padding:18px 50px;">🔄 다시보기</button>
    </div>
  </footer>
  </div>

  <audio id="spaceSound" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7a7e57f6d9.mp3?filename=space-ambient-110997.mp3" type="audio/mpeg">
  </audio>

  <audio id="boomSound">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/24/audio_7d6a98d12d.mp3?filename=explosion-6055.mp3" type="audio/mpeg">
  </audio>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7a7e57f6d9.mp3?filename=space-ambient-110997.mp3" type="audio/mpeg">
  </audio>

  <script>
    const startScreen = document.getElementById('startScreen');
    const simulationScreen = document.getElementById('simulationScreen');
    const star = document.getElementById('star');
    const stageTitle = document.getElementById('stageTitle');
    const boomSound = document.getElementById('boomSound');
    const infoBox = document.getElementById('infoBox');
    const statusBox = document.getElementById('statusBox');
    const massSelect = document.getElementById('massSelect');
    const sizeSelect = document.getElementById('sizeSelect');
    const sound = document.getElementById('spaceSound');

    let currentTimeouts = [];

    function updateInfo(text, temp, bright, size) {
      infoBox.innerHTML = text;
      statusBox.innerHTML = `온도: ${temp} | 밝기: ${bright} | 크기: ${size}`;
    }

    function clearTimers() {
      currentTimeouts.forEach(t => clearTimeout(t));
      currentTimeouts = [];
    }

    function startSimulation() {
      startScreen.style.display = 'none';
      simulationScreen.style.display = 'flex';
      startEvolution();
    }

    function startEvolution() {
      clearTimers();

      sound.play();
      stageTitle.innerHTML = '☁️ 성운 단계';

      const mass = massSelect.value;
      const size = sizeSelect.value;

      let scale = 1;

      if(size === 'small') scale = 0.8;
      if(size === 'medium') scale = 1;
      if(size === 'large') scale = 1.3;

      star.style.transform = `translate(-50%, -50%) scale(${scale})`;

      // 성운 단계
      star.className = 'star nebula';
      updateInfo(
        '☁️ 성운 단계: 우주 공간의 먼지와 가스가 중력에 의해 모여 거대한 성운을 형성합니다. 중심부의 압력과 온도가 계속 높아지며 새로운 별이 태어날 준비를 합니다.',
        '낮음',
        '약함',
        '매우 큼'
      );

      currentTimeouts.push(setTimeout(() => {
        // 주계열성
        stageTitle.innerHTML = '⭐ 주계열성 단계';
        star.className = 'star main-sequence';
        updateInfo(
          '⭐ 주계열성 단계: 중심부에서 수소 핵융합이 활발하게 일어나 막대한 에너지를 방출합니다. 태양도 현재 이 단계에 속하며 가장 오랜 시간 유지됩니다.',
          '약 5,500°C',
          '강함',
          '안정적'
        );
      }, 4000));

      currentTimeouts.push(setTimeout(() => {
        // 적색거성
        stageTitle.innerHTML = '🔴 적색거성 단계';
        star.className = 'star red-giant';
        updateInfo(
          '🔴 적색거성 단계: 중심부 수소가 대부분 소모되면서 별이 크게 팽창합니다. 표면 온도는 낮아져 붉은색을 띠게 됩니다.',
          '약 3,500°C',
          '매우 강함',
          '매우 큼'
        );
      }, 8000));

      if (mass === 'large') {
        currentTimeouts.push(setTimeout(() => {
          // 초신성
          stageTitle.innerHTML = '💥 초신성 단계';
          boomSound.play();
          star.className = 'star supernova';
          updateInfo(
            '💥 초신성 단계: 큰 질량의 별은 마지막 순간 엄청난 폭발을 일으킵니다. 강력한 에너지와 빛이 우주 전체로 퍼져나갑니다.',
            '수백만°C',
            '폭발적',
            '급격히 팽창'
          );
        }, 12000));

        currentTimeouts.push(setTimeout(() => {
          // 블랙홀
          stageTitle.innerHTML = '🕳️ 블랙홀 단계';
          star.className = 'star black-hole';
          updateInfo(
            '🕳️ 블랙홀 단계: 폭발 이후 남은 중심핵의 질량이 매우 크면 블랙홀이 형성됩니다. 빛조차 빠져나오지 못할 정도로 강한 중력을 가집니다.',
            '측정 불가',
            '빛 없음',
            '매우 작음'
          );
        }, 16000));

        currentTimeouts.push(setTimeout(() => {
          stageTitle.innerHTML = '✅ 시뮬레이션 종료';
          infoBox.innerHTML = '별의 진화 과정이 모두 종료되었습니다.';

          setTimeout(() => {
            const retry = confirm('처음 선택 화면으로 돌아가시겠습니까?');

            if (retry) {
              resetSimulation();
            } else {
              document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:black;color:white;font-size:40px;">프로그램이 종료되었습니다.</div>';
            }
          }, 2000);
        }, 19000));

      } else {
        currentTimeouts.push(setTimeout(() => {
          // 백색왜성
          stageTitle.innerHTML = '⚪ 백색왜성 단계';
          star.className = 'star white-dwarf';
          updateInfo(
            '⚪ 백색왜성 단계: 작은 질량의 별은 외곽층을 방출한 뒤 뜨거운 중심핵만 남게 됩니다. 크기는 작지만 매우 높은 온도를 유지합니다.',
            '약 100,000°C',
            '약함',
            '매우 작음'
          );
        }, 12000));
      }
    }

    function resetSimulation() {
      startScreen.style.display = 'flex';
      simulationScreen.style.display = 'none';
      clearTimers();
      star.className = 'star nebula';
      star.style.transform = 'translate(-50%, -50%) scale(1)';

      updateInfo(
        '시뮬레이션이 초기화되었습니다. 다시 시작 버튼을 눌러주세요.',
        '-',
        '-',
        '-'
      );
    }
  </script>

</body>
</html>
