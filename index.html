<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>별의 진화 시뮬레이션 앱</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #10183a, #050816 70%);
      color: white;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      height: 100%;
      background: radial-gradient(circle at top, #10183a, #050816 70%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }

    .start-screen {
      text-align: center;
    }

    .start-screen h1 {
      font-size: 52px;
      color: #ffe082;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .start-screen p {
      font-size: 22px;
      color: #cfd8dc;
      margin-bottom: 30px;
    }

    .control-box {
      display: flex;
      gap: 30px;
      margin-bottom: 30px;
    }

    .control-card {
      background: rgba(255,255,255,0.08);
      padding: 25px;
      border-radius: 20px;
      min-width: 240px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .control-card label {
      font-size: 22px;
      font-weight: bold;
      display: block;
      margin-bottom: 15px;
    }

    select {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: #1e2a5c;
      color: white;
      font-size: 18px;
    }

    .simulation-screen {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .space {
      width: 100%;
      height: 100%;
      position: relative;
      background: linear-gradient(to bottom, #02030a, #09142d);
    }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 2px, transparent 2px);
      background-size: 120px 120px, 180px 180px, 250px 250px;
      opacity: 0.5;
      animation: twinkle 4s infinite alternate;
    }

    .stage-title {
      position: absolute;
      top: 30px;
      width: 100%;
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      color: #fff59d;
      text-shadow: 0 0 15px rgba(255,255,255,0.8);
      z-index: 10;
    }

    footer {
      height: 22%;
      background: rgba(0,0,0,0.6);
      border-top: 2px solid rgba(255,255,255,0.1);
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .info-box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 18px;
      line-height: 1.9;
      min-height: 140px;
      font-size: 22px;
      font-weight: 500;
    }

    .status {
      margin-top: 10px;
      colobutton {
      padding: 16px 34px;
      border: none;
      border-radius: 14px;
      background: #3949ab;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: poinv>
    </div>
  </header>

  <main>
    <div class="space">
      <div class="stars"></div>
      <div class="star nebula" id="star"></div>
    </div>
  </main>

  <footer>
    <div class="info-box" id="infoBox">
      시작 버튼을 눌러 별의 진화 과정을 확인해보세요.
    </div>

    <div class="status" id="statusBox">
      온도: - | 밝기: - | 크기: -
    </div>

    <div class="buttons">
      <button onclick="startEvolution()">▶ 시작</button>
      <button onclick="resetSimulation()">🔄 다시보기</button>
    </div>
  </footer>

  <audio id="spaceSound" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7a7e57f6d9.mp3?filename=space-ambient-110997.mp3" type="audio/mpeg">
  </audio>

  <script>
    const star = document.getElementById('star');
    const infoBox = document.getElementById('infoBox');
    const statusBox = document.getElementById('statusBox');
    const massSelect = document.getElementById('massSelect');
    const sizeSelect = document.getElementById('sizeSelect');
    const sound = document.getElementById('spaceSound');

    let currentTimeouts = [];

    function updateInfo(text, temp, bright, size) {
      infoBox.innerHTML = text;
      statusBox.innerHTML = `온도: ${temp} | 밝기: ${bright} | 크기: ${size}`;
    }

    function clearTimers() {
      currentTimeouts.forEach(t => clearTimeout(t));
      currentTimeouts = [];
    }

    function startEvolution() {
      clearTimers();

      sound.play();

      const mass = massSelect.value;
      const size = sizeSelect.value;

      let scale = 1;

      if(size === 'small') scale = 0.8;
      if(size === 'medium') scale = 1;
      if(size === 'large') scale = 1.3;

      star.style.transform = `translate(-50%, -50%) scale(${scale})`;

      // 성운 단계
      star.className = 'star nebula';
      updateInfo(
        '☁️ 성운 단계: 우주 먼지와 가스가 모여 새로운 별이 만들어지는 단계입니다.',
        '낮음',
        '약함',
        '매우 큼'
      );

      currentTimeouts.push(setTimeout(() => {
        // 주계열성
        star.className = 'star main-sequence';
        updateInfo(
          '⭐ 주계열성 단계: 수소 핵융합이 활발히 일어나 안정적으로 빛을 냅니다.',
          '약 5,500°C',
          '강함',
          '안정적'
        );
      }, 4000));

      currentTimeouts.push(setTimeout(() => {
        // 적색거성
        star.className = 'star red-giant';
        updateInfo(
          '🔴 적색거성 단계: 중심부 수소가 줄어들며 별이 크게 팽창합니다.',
          '약 3,500°C',
          '매우 강함',
          '매우 큼'
        );
      }, 8000));

      if (mass === 'large') {
        currentTimeouts.push(setTimeout(() => {
          // 초신성
          star.className = 'star supernova';
          updateInfo(
            '💥 초신성 단계: 거대한 폭발과 함께 엄청난 에너지를 방출합니다.',
            '수백만°C',
            '폭발적',
            '급격히 팽창'
          );
        }, 12000));

        currentTimeouts.push(setTimeout(() => {
          // 블랙홀
          star.className = 'star black-hole';
          updateInfo(
            '🕳️ 블랙홀 단계: 중력이 매우 강해 빛조차 빠져나올 수 없습니다.',
            '측정 불가',
            '빛 없음',
            '매우 작음'
          );
        }, 16000));

      } else {
        currentTimeouts.push(setTimeout(() => {
          // 백색왜성
          star.className = 'star white-dwarf';
          updateInfo(
            '⚪ 백색왜성 단계: 작은 질량의 별이 마지막에 남기는 뜨거운 핵입니다.',
            '약 100,000°C',
            '약함',
            '매우 작음'
          );
        }, 12000));
      }
    }

    function resetSimulation() {
      clearTimers();
      star.className = 'star nebula';
      star.style.transform = 'translate(-50%, -50%) scale(1)';

      updateInfo(
        '시뮬레이션이 초기화되었습니다. 다시 시작 버튼을 눌러주세요.',
        '-',
        '-',
        '-'
      );
    }
  </script>

</body>
</html>
